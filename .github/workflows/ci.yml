name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m venv .venv313
          .venv313/bin/python -m pip install --upgrade pip
          .venv313/bin/python -m pip install -r requirements.txt
          .venv313/bin/python -m pip install -e .

      - name: Ruff
        run: .venv313/bin/python -m ruff check src tests

      - name: Black
        run: .venv313/bin/python -m black --check src tests

      - name: MyPy
        run: .venv313/bin/python -m mypy src tests

      - name: Pyright
        run: .venv313/bin/python -m pyright src tests

      - name: Pytest
        run: .venv313/bin/python -m pytest

      - name: Bandit
        run: .venv313/bin/python -m bandit -r src

      - name: Build docs
        run: .venv313/bin/python -m pdoc --output-directory docs/site src/csv2json

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site/
